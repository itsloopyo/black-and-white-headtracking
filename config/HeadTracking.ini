; Black & White (2001) head tracking configuration

[Network]
; UDP port for OpenTrack data
Port=4242
EnableOnStartup=true

[Sensitivity]
; Per-axis multipliers (0.1 - 5.0)
Yaw=1.0
Pitch=1.0
Roll=1.0
InvertYaw=false
InvertPitch=false
InvertRoll=false

[Smoothing]
; 0.0 = light baseline smoothing (~0.15 floor always applies), 0.99 = max smoothing
Amount=0.0

[Deadzone]
; Degrees of dead-zone before tracking input is applied (0 - 30)
Yaw=0.0
Pitch=0.0
Roll=0.0

[Hotkeys]
; Virtual-key codes (hex). Defaults: Home=0x24, End=0x23, PageDown=0x22
Recenter=0x24
Toggle=0x23
YawMode=0x22
DebounceMs=200

[View]
; true = horizon-locked yaw (default, "up" stays world-up), false = camera-local yaw
WorldSpaceYaw=true

[Debug]
LogToFile=false
